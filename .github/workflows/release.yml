name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Resolve version
        id: version
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          POM_VERSION="$(mvn -B -q -DforceStdout help:evaluate -Dexpression=project.version)"
          if [ "$VERSION" != "$POM_VERSION" ]; then
            echo "Tag v$VERSION does not match pom.xml version $POM_VERSION"
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "jar=safebox-$VERSION.jar" >> "$GITHUB_OUTPUT"

      - name: Build and test
        run: mvn -B -Pwindows clean test package javafx:jlink

      - name: Create Windows installer
        shell: bash
        run: |
          jpackage \
            --type exe \
            --name SafeBox \
            --input target \
            --main-jar ${{ steps.version.outputs.jar }} \
            --main-class com.safebox.MainApp \
            --runtime-image target/safebox-runtime \
            --icon src/main/resources/images/icon.png \
            --app-version ${{ steps.version.outputs.version }} \
            --description "Local password manager" \
            --vendor SafeBox \
            --dest dist \
            --win-menu \
            --win-shortcut

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/*
            target/${{ steps.version.outputs.jar }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
